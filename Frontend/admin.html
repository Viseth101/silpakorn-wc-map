<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Silpakorn WC Map</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            overflow: hidden;
            color: #1f2937;
        }

        /* Font class for Khmer UI toggle */
        body.lang-kh,
        body.lang-kh input,
        body.lang-kh select,
        body.lang-kh button {
            font-family: 'Battambang', sans-serif !important;
        }

        #loginOverlay,
        #editModalOverlay,
        #addModalOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        #editModalOverlay,
        #addModalOverlay {
            display: none;
        }

        .modal-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 350px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-box h2 {
            margin-top: 0;
            color: #1b3899;
        }

        .modal-box input[type="text"],
        .modal-box input[type="password"],
        .modal-box select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .modal-box button {
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: opacity 0.2s;
        }

        .modal-box button:hover {
            opacity: 0.8;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            margin-bottom: 10px;
            color: #374151;
        }

        .checkbox-container input[type="checkbox"] {
            width: 16px;
            height: 16px;
            margin: 0;
            flex-shrink: 0;
            cursor: pointer;
            accent-color: #1b3899;
        }

        .btn-primary {
            background: #1b3899;
            color: white;
        }

        .btn-cancel {
            background: transparent;
            color: #4b5563;
        }

        .btn-outline {
            border: 2px solid #1b3899 !important;
            color: #1b3899;
            background: transparent;
            margin-bottom: 15px;
            width: 100%;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 15px;
        }

        details {
            margin-bottom: 15px;
            border: 1px solid #d1d5db;
            padding: 10px;
            border-radius: 6px;
            background: #fafafa;
        }

        summary {
            cursor: pointer;
            font-weight: bold;
            color: #1b3899;
            font-size: 14px;
            user-select: none;
        }

        .lang-inputs {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 10px;
        }

        .lang-inputs input {
            margin-bottom: 0 !important;
        }

        #dashboard {
            display: none;
            height: 100vh;
            width: 100vw;
        }

        #sidebar {
            width: 450px;
            background: white;
            height: 100%;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px 20px 0 20px;
            background: #ffffff;
            position: sticky;
            top: 0;
            z-index: 5;
            border-bottom: 1px solid #e5e7eb;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-top h1 {
            margin: 0;
            color: #1b3899;
            font-size: 22px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .btn-backup {
            background: #10b981;
            color: white;
        }

        .btn-add {
            background: #1b3899;
            color: white;
        }

        .tabs {
            display: flex;
            margin-top: 15px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            cursor: pointer;
            font-weight: 600;
            color: #6b7280;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
        }

        .tab.active {
            color: #1b3899;
            border-bottom-color: #1b3899;
        }

        .admin-filter-bar {
            background: #f3f4f6;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .admin-filter-bar input[type="text"],
        .admin-filter-bar select {
            padding: 8px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 13px;
            width: 100%;
            box-sizing: border-box;
        }

        .admin-time-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-content {
            display: none;
            padding: 20px;
            flex: 1;
        }

        .tab-content.active {
            display: block;
        }

        #mapView {
            flex: 1;
            height: 100%;
            background: #e5e3df;
            position: relative;
        }

        .card {
            border: 1px solid #d1d5db;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            background: #fafafa;
            transition: border-color 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .card:hover {
            border-color: #1b3899;
            box-shadow: 0 4px 10px rgba(27, 56, 153, 0.1);
        }

        .card-info h3 {
            margin: 0 0 8px 0;
            color: #111827;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .card-info p {
            margin: 4px 0;
            font-size: 13px;
            color: #4b5563;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .btn-approve {
            background-color: #10b981;
            color: white;
        }

        .btn-reject {
            background-color: #ef4444;
            color: white;
        }

        .btn-edit {
            background-color: #3b82f6;
            color: white;
        }

        .empty-state {
            text-align: center;
            color: #6b7280;
            font-style: italic;
            padding: 40px 20px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            visibility: visible;
        }

        .toast.success {
            background-color: #10b981;
        }

        .toast.error {
            background-color: #ef4444;
        }

        @media(max-width: 768px) {
            #dashboard {
                flex-direction: column-reverse;
            }

            #sidebar {
                width: 100%;
                height: 50vh;
            }

            #mapView {
                width: 100%;
                height: 50vh;
            }
        }
    </style>
</head>

<body>
    <div id="loginOverlay">
        <div class="modal-box" style="text-align: center;">
            <h2>Admin Login</h2>
            <input type="password" id="adminPassword" placeholder="Enter Admin Password">
            <button class="btn-primary" style="width: 100%;" onclick="login()">Unlock Dashboard</button>
        </div>
    </div>

    <div id="editModalOverlay">
        <div class="modal-box">
            <h2>Edit WC</h2>
            <input type="hidden" id="editId">
            <input type="hidden" id="editLat">
            <input type="hidden" id="editLng">

            <label>Name (English) *Primary:</label>
            <input type="text" id="editNameEn" placeholder="e.g. Science Building WC">

            <details>
                <summary>🌍 Add Translations</summary>
                <div class="lang-inputs">
                    <input type="text" id="editNameTh" placeholder="Name (Thai)">
                    <input type="text" id="editNameCn" placeholder="Name (Chinese)">
                    <input type="text" id="editNameKh" placeholder="Name (Khmer)">
                </div>
            </details>

            <label>Operating Hours:</label>
            <label class="checkbox-container">
                <input type="checkbox" id="edit24hCheckbox"
                    onchange="document.getElementById('editTimeFrom').disabled = this.checked; document.getElementById('editTimeTo').disabled = this.checked;">
                <span>Open 24 Hours</span>
            </label>
            <div style="display: flex; gap: 10px; margin-bottom: 15px; align-items: center;">
                <input type="time" id="editTimeFrom"
                    style="flex: 1; padding: 10px 8px; border: 1px solid #d1d5db; border-radius: 6px; min-width: 80px;">
                <span>to</span>
                <input type="time" id="editTimeTo"
                    style="flex: 1; padding: 10px 8px; border: 1px solid #d1d5db; border-radius: 6px; min-width: 80px;">
            </div>

            <label>Access:</label>
            <select id="editAccess">
                <option value="all">All (Staff & Students)</option>
                <option value="student">Students only</option>
                <option value="staff">Staff only</option>
            </select>
            <label>Note (Optional):</label> <input type="text" id="editNote">

            <button class="btn-outline" onclick="startReposition()">📍 Reposition Marker on Map</button>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                <button class="btn-primary" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="addModalOverlay">
        <div class="modal-box">
            <h2>Add New WC Directly</h2>
            <p style="font-size: 12px; color: #6b7280; margin-bottom: 15px;">Bypasses pending queue.</p>
            <input type="hidden" id="addLat">
            <input type="hidden" id="addLng">

            <label>Name (English) *Primary:</label>
            <input type="text" id="addNameEn" placeholder="e.g. Science Building WC">

            <details>
                <summary>🌍 Add Translations</summary>
                <div class="lang-inputs">
                    <input type="text" id="addNameTh" placeholder="Name (Thai)">
                    <input type="text" id="addNameCn" placeholder="Name (Chinese)">
                    <input type="text" id="addNameKh" placeholder="Name (Khmer)">
                </div>
            </details>

            <label>Operating Hours:</label>
            <label class="checkbox-container">
                <input type="checkbox" id="add24hCheckbox"
                    onchange="document.getElementById('addTimeFrom').disabled = this.checked; document.getElementById('addTimeTo').disabled = this.checked;">
                <span>Open 24 Hours</span>
            </label>
            <div style="display: flex; gap: 10px; margin-bottom: 15px; align-items: center;">
                <input type="time" id="addTimeFrom"
                    style="flex: 1; padding: 10px 8px; border: 1px solid #d1d5db; border-radius: 6px; min-width: 80px;">
                <span>to</span>
                <input type="time" id="addTimeTo"
                    style="flex: 1; padding: 10px 8px; border: 1px solid #d1d5db; border-radius: 6px; min-width: 80px;">
            </div>

            <label>Access:</label>
            <select id="addAccess">
                <option value="all">All (Staff & Students)</option>
                <option value="student">Students only</option>
                <option value="staff">Staff only</option>
            </select>
            <label>Note (Optional):</label> <input type="text" id="addNote">

            <button class="btn-outline" onclick="startAddPosition()">📍 Click to Drop Marker on Map</button>
            <p id="addCoordsText"
                style="display:none; color:#10b981; font-size:12px; text-align:center; font-weight:bold; margin-bottom:10px;">
                ✅ Location Set!</p>

            <div class="modal-actions">
                <button class="btn-cancel"
                    onclick="document.getElementById('addModalOverlay').style.display='none'">Cancel</button>
                <button class="btn-primary" onclick="submitAdminAdd()">Add to Map</button>
            </div>
        </div>
    </div>

    <div id="dashboard">
        <div id="sidebar">
            <div class="sidebar-header">
                <div class="header-top">
                    <h1>Admin Dashboard</h1>
                    <div class="header-actions">
                        <button class="action-btn btn-backup" onclick="downloadBackup()">📥 Backup</button>
                        <button class="action-btn btn-add"
                            onclick="document.getElementById('addModalOverlay').style.display='flex'">➕ Add WC</button>
                    </div>
                </div>

                <div class="tabs">
                    <div class="tab active" onclick="switchTab('pending', this)">Pending</div>
                    <div class="tab" onclick="switchTab('manage', this)">Manage All</div>
                </div>
            </div>

            <div class="admin-filter-bar" id="adminFilterContainer" style="display:none;">
                <input type="text" id="adminSearch" placeholder="Search WCs..." oninput="applyAdminFilters()">
                <select id="adminFilterAccess" onchange="applyAdminFilters()">
                    <option value="any">Any Access</option>
                    <option value="all">All (Staff & Students)</option>
                    <option value="student">Students only</option>
                    <option value="staff">Staff only</option>
                </select>
                <label class="checkbox-container">
                    <input type="checkbox" id="adminFilter24h" onchange="applyAdminFilters()">
                    <span>Open 24h Only</span>
                </label>
                <div class="admin-time-row">
                    <span style="font-size:12px; color:#6b7280; font-weight:bold;">Or open during:</span>
                    <input type="time" id="adminTimeFrom" style="padding:8px; flex:1; min-width:80px; border: 1px solid #d1d5db; border-radius: 6px;" onchange="applyAdminFilters()">
                    <span>-</span>
                    <input type="time" id="adminTimeTo" style="padding:8px; flex:1; min-width:80px; border: 1px solid #d1d5db; border-radius: 6px;" onchange="applyAdminFilters()">
                </div>
            </div>

            <div id="pendingTab" class="tab-content active">
                <div id="pendingList">
                    <div class="empty-state">Loading pending places...</div>
                </div>
            </div>

            <div id="manageTab" class="tab-content">
                <div id="manageList">
                    <div class="empty-state">Loading places...</div>
                </div>
            </div>
        </div>
        <div id="mapView"></div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        let sessionPassword = "";
        let map;
        let adminMarkers = [];
        let currentTab = "pending";
        let allApprovedPlaces = [];

        function showToast(message, type = "success") {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = `toast show ${type}`;
            setTimeout(() => { toast.classList.remove("show"); }, 3000);
        }

        async function login() {
            const passInput = document.getElementById("adminPassword").value;
            if (!passInput) return showToast("Please enter a password.", "error");

            try {
                const res = await fetch('/api/admin-login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: passInput })
                });

                if (res.ok) {
                    sessionPassword = passInput;
                    document.getElementById('loginOverlay').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'flex';
                    initAdminMap();
                } else { showToast("Incorrect password!", "error"); }
            } catch (e) { console.error("Login error", e); }
        }

        // wire up enter key after DOM creation
        document.getElementById("adminPassword").addEventListener("keypress", (e) => {
            if (e.key === "Enter") login();
        });

        async function initAdminMap() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();

                window.loadMapData = function () {
                    map = new google.maps.Map(document.getElementById("mapView"), {
                        zoom: 16.5, center: { lat: 13.8188, lng: 100.0402 }, disableDefaultUI: false,
                    });
                    loadDataForCurrentTab();
                };

                const script = document.createElement("script");
                script.src = `https://maps.googleapis.com/maps/api/js?key=${config.mapsApiKey}&callback=loadMapData`;
                script.async = true; script.defer = true;
                document.head.appendChild(script);
            } catch (err) { console.error("Failed to load map", err); }
        }

        function switchTab(tabName, element) {
            currentTab = tabName;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            element.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');

            document.getElementById('adminFilterContainer').style.display = tabName === 'manage' ? 'flex' : 'none';
            loadDataForCurrentTab();
        }

        function loadDataForCurrentTab() {
            if (currentTab === 'pending') fetchPending();
            if (currentTab === 'manage') fetchAllPlaces();
        }

        async function fetchPending() {
            try {
                const res = await fetch('/api/pending');
                renderList(await res.json(), 'pendingList');
            } catch (err) { console.error(err); }
        }

        async function fetchAllPlaces() {
            try {
                const res = await fetch('/api/all-places');
                allApprovedPlaces = await res.json();
                applyAdminFilters();
            } catch (err) { console.error(err); }
        }

        function timeToMins(t) {
            if (!t) return 0;
            const [h, m] = t.split(":");
            return parseInt(h) * 60 + parseInt(m);
        }

        function checkTimeOverlap(pFrom, pTo, fFrom, fTo) {
            const overlap = (start1, end1, start2, end2) => Math.max(start1, start2) < Math.min(end1, end2);
            const pIntervals = pFrom < pTo ? [[pFrom, pTo]] : [[pFrom, 1440], [0, pTo]];
            const fIntervals = fFrom < fTo ? [[fFrom, fTo]] : [[fFrom, 1440], [0, fTo]];

            for (let [ps, pe] of pIntervals) {
                for (let [fs, fe] of fIntervals) {
                    if (overlap(ps, pe, fs, fe)) return true;
                }
            }
            return false;
        }

        // ==========================================
        // ROBUST ACCESS CHECKER (ADMIN)
        // ==========================================
        function checkAccessRole(accessText) {
            if (!accessText) return "all";
            const text = accessText.toLowerCase();
            
            // Staff terms in different languages
            const staffTerms = ["staff", "เฉพาะบุคลากร", "仅限员工", "បុគ្គលិក"];
            
            // Student terms in different languages  
            const studentTerms = [
                "student",                    // English: "Students only"
                "เฉพาะนักศึกษา",             // Thai: Alternative student term
                "นักศึกษาเท่านั้น",          // Thai: Actual term in database
                "นักศึกษา",                   // Thai: Simplified student term
                "仅限学生",                   // Chinese
                "សិស្ស"                       // Khmer
            ];

            if (staffTerms.some(term => text.includes(term.toLowerCase()))) return "staff";
            if (studentTerms.some(term => text.includes(term.toLowerCase()))) return "student";
            return "all";
        }

        function applyAdminFilters() {
            if (currentTab !== 'manage') return;
            const query = document.getElementById('adminSearch').value.toLowerCase();
            const f24h = document.getElementById('adminFilter24h').checked;
            const fFrom = document.getElementById('adminTimeFrom').value;
            const fTo = document.getElementById('adminTimeTo').value;
            const filterAccess = document.getElementById("adminFilterAccess").value;

            const filtered = allApprovedPlaces.filter(place => {
                const primaryName = place.names ? place.names.en : place.building;
                let match = primaryName.toLowerCase().includes(query);

                if (match) {
                    const hours = (place.operatingHours || "").toLowerCase();

                    if (f24h) {
                        if (!hours.includes("24")) match = false;
                    } else if (fFrom && fTo) {
                        if (hours.includes("-")) {
                            const [mFrom, mTo] = hours.split("-").map(s => s.trim());
                            match = checkTimeOverlap(timeToMins(mFrom), timeToMins(mTo), timeToMins(fFrom), timeToMins(fTo));
                        } else if (!hours.includes("24")) {
                            match = false;
                        }
                    }

                    if (match && filterAccess !== "any") {
                        const role = checkAccessRole(place.access || "");
                        if (role !== filterAccess) {
                            match = false;
                        }
                    }
                }
                return match;
            });
            renderList(filtered, 'manageList');
        }

        function renderList(places, containerId) {
            const list = document.getElementById(containerId);
            list.innerHTML = '';
            adminMarkers.forEach(m => m.setMap(null));
            adminMarkers = [];

            if (places.length === 0) { list.innerHTML = `<div class="empty-state">🎉 No WCs found!</div>`; return; }

            places.forEach(place => {
                let color = "#10b981"; // Default green for Open

                if (currentTab === 'pending') {
                    color = "#eab308"; // Standard pending color
                } else {
                    // Use consistent color logic with client side
                    const role = checkAccessRole(place.access || place.note || place.notes || "");
                    if (role === "staff") {
                        color = "#f59e0b"; // Staff = Orange
                    } else if (role === "student") {
                        color = "#3b82f6"; // Student = Blue
                    } else {
                        // All access: check operating hours for current status
                        const hours = (place.operatingHours || "").toLowerCase();
                        if (hours.includes("24")) {
                            color = "#10b981"; // 24h = Green
                        } else if (hours.includes("-")) {
                            // We don't have current time logic here, so assume open for all-access places
                            color = "#10b981"; // Open = Green
                        } else {
                            color = "#9ca3af"; // Closed/Unknown = Gray
                        }
                    }
                }

                const svgIcon = `
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 28 28">
                <circle cx="14" cy="16" r="10" fill="rgba(0,0,0,0.3)" />
                <circle cx="14" cy="14" r="10" fill="${color}" stroke="#ffffff" stroke-width="2.5" />
            </svg>
        `;

                const marker = new google.maps.Marker({
                    position: { lat: place.lat, lng: place.lng },
                    map: map, title: place.names ? place.names.en : place.building, animation: google.maps.Animation.DROP,
                    icon: { url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svgIcon), anchor: new google.maps.Point(14, 14) }
                });
                adminMarkers.push(marker);

                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => {
                    map.panTo(marker.getPosition()); map.setZoom(18);
                    marker.setAnimation(google.maps.Animation.BOUNCE);
                    setTimeout(() => marker.setAnimation(null), 1500);
                };

                let actionButtons = "";
                const placeDataStr = encodeURIComponent(JSON.stringify(place));

                if (currentTab === 'pending') {
                    actionButtons = `
                <button class="btn btn-approve" onclick="handleAction(event, ${place.id}, 'approve')">Approve ✓</button>
                <button class="btn btn-edit" onclick="openEditModal(event, '${placeDataStr}')">Edit ✏️</button>
                <button class="btn btn-reject" onclick="handleAction(event, ${place.id}, 'reject')">Reject ✕</button>
            `;
                } else {
                    actionButtons = `
                <button class="btn btn-edit" onclick="openEditModal(event, '${placeDataStr}')">Edit ✏️</button>
                <button class="btn btn-reject" onclick="handleAction(event, ${place.id}, 'reject')">Delete 🗑️</button>
            `;
                }

                const displayName = place.names ? place.names.en : place.building;
                const detectTag = place.detectedLang ? `<span style="font-size:10px; background:#e5e7eb; padding:2px 4px; border-radius:4px; color:#4b5563;">Auto-Detected: ${place.detectedLang.toUpperCase()}</span>` : "";

                card.innerHTML = `
            <div class="card-info">
                <h3><span class="status-dot" style="background-color: ${color};"></span> ${displayName} ${detectTag}</h3>
                <p><strong>🕒 Hours:</strong> ${place.operatingHours}</p>
                <p><strong>👥 Access:</strong> ${place.access}</p>
                <p><strong>📝 Note:</strong> ${place.note || place.notes || 'None'}</p>
            </div>
            <div class="card-actions">${actionButtons}</div>
        `;
                list.appendChild(card);
            });
        }

        async function handleAction(event, id, action) {
            event.stopPropagation();
            if (!confirm(`Are you sure you want to ${action === 'reject' ? 'delete/reject' : 'approve'} this WC?`)) return;

            try {
                const res = await fetch(`/api/${action}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, password: sessionPassword })
                });
                if (res.ok) { showToast(`Successfully completed action.`); loadDataForCurrentTab(); }
                else showToast("Action failed. Check password.", "error");
            } catch (err) { console.error(err); }
        }

        async function downloadBackup() {
            try {
                const res = await fetch('/api/all-places');
                const data = await res.json();
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `silpakorn_wc_backup_${new Date().toISOString().slice(0, 10)}.json`;
                document.body.appendChild(a);
                a.click(); a.remove();
                showToast("Backup downloaded!", "success");
            } catch (e) { showToast("Backup failed.", "error"); }
        }

        function openEditModal(event, placeDataStr) {
            event.stopPropagation();
            const place = JSON.parse(decodeURIComponent(placeDataStr));

            document.getElementById('editId').value = place.id;

            if (place.names) {
                document.getElementById('editNameEn').value = place.names.en || "";
                document.getElementById('editNameTh').value = place.names.th || "";
                document.getElementById('editNameCn').value = place.names.cn || "";
                document.getElementById('editNameKh').value = place.names.kh || "";
            } else {
                document.getElementById('editNameEn').value = place.building || "";
            }

            // Sets dropdown using agnostic checker
            const role = checkAccessRole(place.access || "");
            document.getElementById('editAccess').value = role;

            document.getElementById('editNote').value = place.note || place.notes || "";
            document.getElementById('editLat').value = place.lat;
            document.getElementById('editLng').value = place.lng;

            const hours = place.operatingHours || "";
            if (hours.toLowerCase().includes("24")) {
                document.getElementById('edit24hCheckbox').checked = true;
                document.getElementById('editTimeFrom').disabled = true;
                document.getElementById('editTimeTo').disabled = true;
                document.getElementById('editTimeFrom').value = "";
                document.getElementById('editTimeTo').value = "";
            } else if (hours.includes("-")) {
                document.getElementById('edit24hCheckbox').checked = false;
                document.getElementById('editTimeFrom').disabled = false;
                document.getElementById('editTimeTo').disabled = false;
                const parts = hours.split("-");
                document.getElementById('editTimeFrom').value = parts[0].trim();
                document.getElementById('editTimeTo').value = parts[1].trim();
            } else {
                document.getElementById('edit24hCheckbox').checked = false;
                document.getElementById('editTimeFrom').value = "";
                document.getElementById('editTimeTo').value = "";
            }

            document.getElementById('editModalOverlay').style.display = 'flex';
        }

        function closeEditModal() { document.getElementById('editModalOverlay').style.display = 'none'; }

        function startReposition() {
            document.getElementById('editModalOverlay').style.display = 'none';
            showToast("Click anywhere on the map to set the NEW location.", "success");
            map.setOptions({ draggableCursor: 'crosshair' });

            google.maps.event.addListenerOnce(map, 'click', function (event) {
                document.getElementById('editLat').value = event.latLng.lat();
                document.getElementById('editLng').value = event.latLng.lng();
                map.setOptions({ draggableCursor: '' });
                document.getElementById('editModalOverlay').style.display = 'flex';
                showToast("Coordinates updated! Click Save.", "success");
            });
        }

        async function saveEdit() {
            let openTime = "Not specified";
            if (document.getElementById('edit24hCheckbox').checked) { openTime = "24 Hours"; }
            else if (document.getElementById('editTimeFrom').value && document.getElementById('editTimeTo').value) {
                openTime = `${document.getElementById('editTimeFrom').value} - ${document.getElementById('editTimeTo').value}`;
            }

            const namesObj = {
                en: document.getElementById('editNameEn').value,
                th: document.getElementById('editNameTh').value,
                cn: document.getElementById('editNameCn').value,
                kh: document.getElementById('editNameKh').value
            };

            const payload = {
                password: sessionPassword, id: parseInt(document.getElementById('editId').value),
                names: namesObj, operatingHours: openTime,
                access: document.getElementById('editAccess').value, note: document.getElementById('editNote').value,
                lat: document.getElementById('editLat').value, lng: document.getElementById('editLng').value
            };
            try {
                const res = await fetch('/api/edit-place', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (res.ok) { closeEditModal(); showToast("WC updated!", "success"); loadDataForCurrentTab(); }
                else showToast("Failed to save changes.", "error");
            } catch (err) { console.error(err); }
        }

        function startAddPosition() {
            document.getElementById('addModalOverlay').style.display = 'none';
            showToast("Click map to drop new marker.", "success");
            map.setOptions({ draggableCursor: 'crosshair' });

            google.maps.event.addListenerOnce(map, 'click', function (event) {
                document.getElementById('addLat').value = event.latLng.lat();
                document.getElementById('addLng').value = event.latLng.lng();
                map.setOptions({ draggableCursor: '' });
                document.getElementById('addCoordsText').style.display = 'block';
                document.getElementById('addModalOverlay').style.display = 'flex';
            });
        }

        async function submitAdminAdd() {
            const enName = document.getElementById('addNameEn').value;
            const lat = document.getElementById('addLat').value;
            const lng = document.getElementById('addLng').value;

            if (!enName || !lat) return showToast("Primary Name (EN) and Map Location are required.", "error");

            let openTime = "Not specified";
            if (document.getElementById('add24hCheckbox').checked) { openTime = "24 Hours"; }
            else if (document.getElementById('addTimeFrom').value && document.getElementById('addTimeTo').value) {
                openTime = `${document.getElementById('addTimeFrom').value} - ${document.getElementById('addTimeTo').value}`;
            }

            const namesObj = {
                en: enName,
                th: document.getElementById('addNameTh').value,
                cn: document.getElementById('addNameCn').value,
                kh: document.getElementById('addNameKh').value
            };

            const payload = {
                password: sessionPassword, names: namesObj,
                operatingHours: openTime,
                access: document.getElementById('addAccess').value, note: document.getElementById('addNote').value,
                lat: lat, lng: lng
            };
            try {
                const res = await fetch('/api/admin-add-place', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (res.ok) {
                    document.getElementById('addModalOverlay').style.display = 'none';
                    document.getElementById('addNameEn').value = ""; document.getElementById('addNameTh').value = "";
                    document.getElementById('addNameCn').value = ""; document.getElementById('addNameKh').value = "";
                    document.getElementById('addCoordsText').style.display = "none";
                    document.getElementById('addTimeFrom').value = ""; document.getElementById('addTimeTo').value = "";
                    document.getElementById('add24hCheckbox').checked = false;
                    showToast("Added instantly!", "success");
                    loadDataForCurrentTab();
                } else showToast("Failed to add.", "error");
            } catch (err) { console.error(err); }
        }
    </script>
</body>

</html>
