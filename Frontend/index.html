<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">Silpakorn Map</title>
    <link rel="icon" type="image/x-icon" href="./assets/silpakorn-icon.png">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="map-control top-left-logo">
        <img src="./assets/silpakorn-icon.png" alt="Silpakorn Logo">
        <strong data-i18n="navTitle">Silpakorn Map</strong>
    </div>

    <div class="map-control top-right-search">
        <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="Search places..."
            onkeyup="searchMarkers()">
        <span class="search-icon">🔍</span>
    </div>

    <div class="map-control bottom-left-controls">
        <label class="toggle-label">
            <span data-i18n="satellite">Satellite</span>
            <div class="toggle-wrapper">
                <input type="checkbox" id="satelliteToggle" class="sr-only" onchange="toggleSatelliteMode()">
                <div id="satToggleTrack" class="toggle-track"></div>
                <div id="satToggleDot" class="toggle-dot"></div>
            </div>
        </label>

        <label class="toggle-label">
            <span data-i18n="darkMode">Dark Mode</span>
            <div class="toggle-wrapper">
                <input type="checkbox" id="darkModeToggle" class="sr-only" onchange="toggleDarkMode()">
                <div id="toggleTrack" class="toggle-track"></div>
                <div id="toggleDot" class="toggle-dot"></div>
            </div>
        </label>

        <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="th">ภาษาไทย</option>
            <option value="cn">中文</option>
        </select>
    </div>

    <div id="map"></div>
    <button id="addPlaceFab" class="fab" title="Add new place">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
    </button>

    <div id="addPlaceModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2>Add New Place</h2>
            <p style="font-size: 14px; color: #6b7280; margin-bottom: 20px;">Submit a place for admin review.</p>

            <div class="form-group">
                <label for="placeTitle">Place Name</label>
                <input type="text" id="placeTitle" placeholder="e.g. New Cafe" required>
            </div>

            <div class="form-group">
                <label for="placeOpenTime">Open Time (Optional)</label>
                <input type="text" id="placeOpenTime" placeholder="e.g. 08:00 - 18:00">
            </div>

            <div class="form-group">
                <label>Location</label>
                <button type="button" id="pickLocationBtn" class="btn-secondary">📍 Pick Location on Map</button>
                <p id="selectedCoordsText" style="font-size: 12px; color: #059669; margin-top: 8px; display: none;">
                    Location selected!</p>
            </div>

            <div class="modal-actions">
                <button type="button" id="cancelModalBtn" class="btn-text">Cancel</button>
                <button type="button" id="submitPlaceBtn" class="btn-primary">Submit Place</button>
            </div>
        </div>
    </div>

    <div id="mapConfirmUI" class="map-confirm-ui hidden">
        <p>Drag the map to the exact location.</p>
        <div style="display: flex; gap: 10px; align-items: center; justify-content: center;">
            <button id="cancelMarkerBtn" class="btn-text" style="background: transparent; margin: 0;">Cancel</button>
            <button id="confirmMarkerBtn" class="btn-primary" style="margin: 0;">Confirm Location</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
